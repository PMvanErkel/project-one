<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#6B7A52"/>

  <!-- Outer badge ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#F2EDE3" stroke-width="4"/>
  <!-- Inner badge ring -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#F2EDE3" stroke-width="1.5"/>

  <!-- Top label band -->
  <rect x="108" y="130" width="296" height="52" rx="4" fill="#F2EDE3" opacity="0.12"/>
  <text x="256" y="165" font-family="Georgia, serif" font-size="30" font-weight="bold"
        fill="#F2EDE3" text-anchor="middle" letter-spacing="7">GYM TRACKER</text>

  <!-- Barbell bar -->
  <rect x="116" y="244" width="280" height="24" rx="12" fill="#F2EDE3"/>

  <!-- Left outer plate -->
  <rect x="70" y="200" width="24" height="112" rx="7" fill="#F2EDE3"/>
  <!-- Left inner plate -->
  <rect x="96" y="216" width="16" height="80" rx="5" fill="#DDD7C8"/>

  <!-- Right outer plate -->
  <rect x="418" y="200" width="24" height="112" rx="7" fill="#F2EDE3"/>
  <!-- Right inner plate -->
  <rect x="400" y="216" width="16" height="80" rx="5" fill="#DDD7C8"/>

  <!-- Collar clips -->
  <rect x="114" y="236" width="14" height="40" rx="4" fill="#C8BFA8"/>
  <rect x="384" y="236" width="14" height="40" rx="4" fill="#C8BFA8"/>

  <!-- Divider lines flanking bottom text -->
  <line x1="118" y1="336" x2="196" y2="336" stroke="#F2EDE3" stroke-width="1.5" opacity="0.6"/>
  <line x1="316" y1="336" x2="394" y2="336" stroke="#F2EDE3" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom label -->
  <text x="256" y="344" font-family="Georgia, serif" font-size="22"
        fill="#F2EDE3" text-anchor="middle" letter-spacing="5" opacity="0.85">EST. 2025</text>

  <!-- Diamond ornaments -->
  <polygon points="256,106 262,116 256,126 250,116" fill="#F2EDE3" opacity="0.75"/>
  <polygon points="256,386 262,396 256,406 250,396" fill="#F2EDE3" opacity="0.75"/>
</svg>
